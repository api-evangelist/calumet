aid: calumet
name: Calumet
description: >-
  Calumet is a specialty hydrocarbon and renewable fuels company that produces
  a broad portfolio of branded and customer-formulated specialty products
  including lubricating oils, white mineral oils, solvents, waxes, and
  renewable diesel through its Montana Renewables subsidiary. The company
  serves customers across consumer, industrial, and energy markets globally.
  Calumet does not publish a public developer API portal.
